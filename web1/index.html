<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專屬標籤心理測驗</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        /* CSS Reset 與基本設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', '微軟正黑體', sans-serif;
        }

        html, body {
    /* 必須讓 html 也能滾動 */
    height: auto; 
    /* 核心：稍微超出 100%，誘發瀏覽器隱藏 Bar 的機制 */
    min-height: 101vh; 
    background-color: #3A3A3A;
    margin: 0;
    padding: 0;
    /* 允許垂直滾動 */
    overflow-y: auto; 
    overflow-x: hidden;
    /* 讓滾動更順滑 */
    -webkit-overflow-scrolling: touch; 
}
        
        

        /* 模擬手機畫面的容器 */
        #app {
    width: 100%;
    max-width: 450px;
    /* 保持你想要的比例高度 */
    min-height: 800px; 
    
    /* 不要用 100vh，改用 100% 讓它跟隨 body */
    height: 100%; 
    
    background-color: #3A3A3A;
    display: flex;
    flex-direction: column;
    position: relative;
    margin: 0 auto; /* 置中 */
    
    /* ⚠️ 重要：移除 overflow: hidden，或者確保它不會攔截全頁滾動 */
    overflow: visible; 
}
      /* 頂部導覽列改為圖片滿版排列 */
        header {
            background-color: transparent;
            z-index: 10;
            /* 移除原本的 padding 與 border，讓圖片完全貼齊邊緣 */
            padding: 0; 
            border-bottom: none; 
        }
        
        header img {
            width: 100%; /* 強制滿版寬度 */
            height: auto;
            display: block;
        }
        /* 聊天顯示區 */
        #chat-container {
            flex: 1;
            padding: 20px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth; 
        }

        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background-color: #888;
            border-radius: 3px;
        }

        /* 訊息氣泡通用設定 */
        .msg-wrapper {
            display: flex;
            margin-bottom: 15px;
            width: 100%;
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .msg-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* 貼圖/卡牌專用氣泡 */
        .msg-bubble-img {
            max-width: 200px; 
            border-radius: 10px;
            padding: 0;
            background: transparent !important;
            box-shadow: none !important;
            transition: opacity 0.3s ease-in-out;
        }

        .msg-bubble-img img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* 語音氣泡樣式修正 */
        .msg-bubble-audio {
            max-width: 80%;
            background: #ffffff;
            padding: 8px;
            border-radius: 15px;
            border: 1px solid #eaeaea;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
        }
        audio {
            width: 220px; 
            height: 35px;
        }

        /* 系統/主播訊息 (左側) */
        .msg-system {
            justify-content: flex-start;
        }
        .msg-system .msg-bubble {
            background-color: #ffffff;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }

        /* 文件附件樣式 */
        .msg-bubble-doc {
            background-color: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            max-width: 80%;
            transition: background-color 0.2s;
        }
        .msg-bubble-doc:active { background-color: #f0f0f0; }
        .doc-icon { font-size: 24px; margin-right: 12px; }
        .doc-info { display: flex; flex-direction: column; }
        .doc-title { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 4px; }
        .doc-size { font-size: 12px; color: #888; }

        /* 使用者訊息 (右側) */
        .msg-user {
            justify-content: flex-end;
        }
        .msg-user .msg-bubble {
            background-color: #843939; /* 配合你新的主視覺色 */
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* -------- 底部整合區域 (工具列 + 操作區) -------- */
        #bottom-area {
            background-color: #B7B7B7; /* 配合 Action Area */
            display: flex;
            flex-direction: column;
            position: relative; 
            z-index: 105; 
        }

        /* 工具列橫幅 (改為圖片背景) */
        #toolbar {
            display: none; 
            justify-content: flex-end;
            align-items: center;
            padding: 8px 15px;
            /* 將 cover 改為 100% 100%，確保圖片完整顯示在框框內 */
            background: url('./pics/t2.png') no-repeat;
            background-size: 100% 100%; 
            gap: 20px; 
            /* 設定一個最小高度，確保圖片有空間撐開，你可以根據圖片比例調整這數字 */
            min-height: 70px; 
            border-bottom: none; /* 移除原本的底線避免干擾 */
        }

        /* 工具按鈕 (改為背景圖片切換) */
        .tool-btn {
            width: 35px;
            height: 35px;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
            background-color: transparent;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            margin-top: 20px;
        }
        
        .tool-btn:active {
            transform: scale(0.9);
        }

        #report-btn {
            background-image: url('./pics/st2.png');
        }

        #toggle-btn {
            background-image: url('./pics/st1.png'); /* 預設為 st1 */
        }

        /* 操作區 (改為灰底色) */
        #action-area {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 110px; 
            background-color: #B7B7B7; 
        }

        /* 選項按鈕 (無圓角、暗紅色系) */
        .option-btn {
            background-color: transparent;
            border: 1px solid #843939;
            color: #843939;
            padding: 12px 15px;
            border-radius: 0; /* 移除圓角 */
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .option-btn:hover, .option-btn:active {
            background-color: #843939;
            color: #ffffff;
        }

        .option-btn:disabled, .sticker-img:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px;
            width: 100%;
        }

        .sticker-img {
            width: 100%;
            aspect-ratio: 1; 
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            background-color: #f0f0f0; 
            transition: transform 0.1s;
        }

        .sticker-img:active {
            transform: scale(0.95);
        }

        /* -------- 彈出視窗 Modal -------- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.2s ease-out forwards;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .modal-actions {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .modal-btn:active {
            opacity: 0.8;
        }

        .btn-yes { background-color: #843939; color: #ffffff; }
        .btn-no { background-color: #e0e0e0; color: #333; }

        #report-modal { z-index: 110; }
        /* ========================================= */
        /*        確認回報問題彈窗 (替換為圖片背景)      */
        /* ========================================= */
        
        #report-modal .modal-content {
            background: url('./pics/report1.png') center/contain no-repeat;
            background-color: transparent;
            box-shadow: none;
            border-radius: 0;
            width: 350px; 
            max-width: 90%;
            min-height: 200px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* ⚠️ 【調整文字高低的地方】⚠️ 
               修改下面 padding 的第一個數字(50px)。
               數字越大，文字越往下；數字越小，文字越往上。*/
            padding: 50px 20px 30px 20px; 
        }

        /* 標題文字：「確認回報問題？」 */
        #report-modal .modal-title {
            color: #ffffff; /* 視圖片底色，也可改為 #333 */
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            /* ⚠️ 這裡的 margin-bottom 控制標題跟下面兩個按鈕的距離 */
            margin-bottom: 35px; 
        }

        #report-modal .modal-actions {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 15px;
        }

        /* 「否」按鈕樣式 (reportn.png) */
        #report-modal .btn-no {
            background: url('./pics/reportn.png') center/contain no-repeat;
            background-color: transparent;

        #report-modal .btn-no:active, #report-modal .btn-yes:active {

        #glitch-modal { pointer-events: none; }

        /* 系統異常專用的彈窗樣式 (替換為圖片背景) */
        #glitch-modal .modal-content {
            pointer-events: auto;
            background: url('./pics/error1.png') center/contain no-repeat;
            background-color: transparent;
            box-shadow: none;
            border-radius: 0;
            width: 350px; 
            max-width: 90%;
            min-height: 250px; 
            padding: 60px 20px 40px 20px; /* 可微調此處上下距離讓文字精準落入框內 */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 系統異常標題文字 */
        #glitch-modal .modal-title {
            color: #ffffff; 
            font-size: 16px;
            margin-bottom: 15px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* 系統異常按鈕樣式 (error2.png) */
        #glitch-modal .btn-no {
            background: url('./pics/error2.png') center/contain no-repeat;
            background-color: transparent;
            width: 140px; 
            height: 50px;
            color: #ffffff; 
            font-weight: bold;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        #glitch-modal .btn-no:active {
            transform: scale(0.95);
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s; }

        /* ========================================= */
        /*          結果頁底部資訊區塊 (Footer)         */
        /* ========================================= */
        .result-footer {
            background-color: #000000;
            width: 100%;
            padding: 80px 20px; /* 上下留空適當空間 */
            color: #d1d1d1; /* 灰白色字體 */
            text-align: center;
            flex-shrink: 0;
            overflow-x: hidden; /* 防止 20px 字距導致畫面橫向溢出 */
            box-sizing: border-box;
        }

        /* 1. 主標題 (About Us 關於我們) */
        .result-footer .footer-title {
            font-size: 25px;
            font-weight: bold;
            letter-spacing: 6px;
            line-height: 1.5;
            margin-bottom: 20px;
            /* 修正大字距造成的視覺偏移，讓文字真正置中 */
            padding-left: 20px; 
        }

        /* 2. 副標題 (Independent animation project.) */
        .result-footer .footer-subtitle {
            font-size: 9px;
            letter-spacing: 5px;
            line-height: 2;
            color: #b0b0b0;
            margin-bottom: 50px;
            padding-left: 20px;
        }

        /* 3. 內容連結區 (✦ 連結與聯絡資訊) */
        .result-footer .footer-links {
            text-align: left;
            max-width: 380px; /* 稍微放寬以容納大字距連結 */
            margin: 0 auto;
            font-size: 11px;
            letter-spacing: 3px;
            line-height: 2;
        }

        .result-footer .link-item {
            margin-bottom: 40px; /* 項目間距 */
        }

        /* 超連結樣式設定 */
        .result-footer a {
            color: #ffffff; /* 連結維持亮白 */
            text-decoration: underline;
            word-wrap: break-word; /* 防止網址過長 */
            transition: opacity 0.2s;
        }

        .result-footer a:hover {
            opacity: 0.7;
        }


        /* ========================================= */
        /*             新增：啟動畫面樣式              */
        /* ========================================= */
        /* 啟動畫面半透明塗層 */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7); 
            z-index: 999; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        
        .touch-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 20px;
            letter-spacing: 2px;
            animation: breath 1.5s infinite alternate;
            user-select: none;
        }

        @keyframes breath {
            from { opacity: 0.4; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }

        /* ========================================= */
        /*          前導視訊介面 (Intro Screen)       */
        /* ========================================= */
        #intro-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 200; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #intro-topbar {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: auto;
            z-index: 204; 
            object-fit: contain;
        }

        #intro-wait-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 202;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        #intro-wait-ui::before {
            content: "";
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px; 
            background: url('./pics/bg1.png') center/cover no-repeat;
            z-index: -1; 
            animation: bg-vibrate 3s infinite;
        }

        @keyframes bg-vibrate {
            0%, 30%, 100% { transform: translate(0, 0); }
            3%, 9%, 15%, 21%, 27% { transform: translate(-2px, 1px); }
            6%, 12%, 18%, 24% { transform: translate(2px, -1px); }
        }

        .wait-center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 20px;
            margin-top: -130px; 
        }

        .calling-text {
            color: #ffffff;
            font-size: 18px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 12px;
            height: 24px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }
        
        .wait-center-content img {
            max-width: 100%;
            display: block;
        }
        
        .wait-avatar {
            width: 220px; 
            height: auto;
            margin-bottom: 35px; 
            object-fit: cover;
            animation: 
                avatar-ripple 1.5s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94),
                avatar-vibrate 3s infinite;
        }

        @keyframes avatar-vibrate {
            0%, 30%, 100% { transform: translate(0, 0); }
            3%, 9%, 15%, 21%, 27% { transform: translate(-2px, 1px); }
            6%, 12%, 18%, 24% { transform: translate(2px, -1px); }
        }

        @keyframes avatar-ripple {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.8), 0 0 0 0 rgba(100, 100, 100, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.5), 0 0 0 25px rgba(100, 100, 100, 0.2); }
            100% { box-shadow: 0 0 0 25px rgba(255, 255, 255, 0), 0 0 0 50px rgba(100, 100, 100, 0); }
        }

        .wait-name {
            width: 140px; 
            height: auto;
            margin-bottom: 50px; 
        }

        .wait-status {
            width: 300px; 
            height: auto;
        }

        .wait-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25px; 
            background-color: #000000;
        }

        #intro-video {
            width: 100%; height: 100%;
            object-fit: cover;
            position: absolute; top: 0; left: 0;
            z-index: 201;
        }

        #intro-dialog {
            position: absolute;
            bottom: 120px;
            left: 5%; width: 90%;
            background-color: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            z-index: 202;
            min-height: 120px; 
            display: none;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 16px;

            }
        });
        typewriterTimeouts.push(setTimeout(() => { if(onComplete) onComplete(); }, totalDelay += 300));

    function fadeAudio(audio, targetVolume, duration) {
        const startVolume = audio.volume;
        const diff = targetVolume - startVolume;
        const step = diff / (duration / 50);
        let currentStep = 0;

        const interval = setInterval(() => {
            currentStep++;
            let newVol = startVolume + (step * currentStep);
            if (newVol > 1) newVol = 1; if (newVol < 0) newVol = 0;
            audio.volume = newVol;

            if (currentStep >= (duration / 50)) {
                audio.volume = targetVolume;
                if (targetVolume === 0) audio.pause();
                clearInterval(interval);
            }
        }, 50);
    }

            img.src = content; imgBubble.appendChild(img); wrapper.appendChild(imgBubble);
        } else if (isAudio) {
            const audioBubble = document.createElement("div");
            audioBubble.className = "msg-bubble-audio";
            const audio = document.createElement("audio");
            audio.controls = true; audio.src = content;
            audioBubble.appendChild(audio); wrapper.appendChild(audioBubble);
        } else {
            const bubble = document.createElement("div");
            bubble.className = "msg-bubble"; bubble.innerText = content;
            wrapper.appendChild(bubble);
        }
        chatContainer.appendChild(wrapper); scrollToBottom();
    }

    function handleAnswer(option) {
        disableInputs(); addMessage(option.text, "user");
        if (option.add) {
            for (let character in option.add) { scores[character] += option.add[character]; }
        }
        
        if (option.action === "sticker_skip") {
            setTimeout(() => {
                addMessage("覺得麻煩嗎？沒關係^^那我們繼續", "system");
                triggerNextQuestion();
            }, 500);
            return;

        if (option.action === "sticker_exclusive") {
            setTimeout(() => {
                addMessage("哎呀可惜，這是我問號主持人的專屬貼圖TT", "system");
                triggerNextQuestion();
            }, 500);
            return;

        if (option.action === "play_music") {
            bgmAudio.src = musicList[currentMusicIndex]; bgmAudio.volume = 1;
            bgmAudio.play().catch(e => console.log(e));
            triggerNextQuestion(); 
        } else if (option.action === "skip_music") {
            setTimeout(() => { currentQuestionIndex = 2; renderQuestion(); }, 500);
        } else if (option.action === "change_music") {
            musicSwitchCount++;
            currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
            
            if (musicSwitchCount >= 3 && currentMusicIndex === 0) { flag_MusicCycled = true; }

            bgmAudio.src = musicList[currentMusicIndex];
            bgmAudio.play().catch(e => console.log(e));
            
            const musicResponses = [

                "那麼，這首呢？有沒有讓你更自在一些?",
                "現在這首，聽起來感覺如何呢？"
            ];
            const responseText = musicResponses[(musicSwitchCount - 1) % musicResponses.length];

            setTimeout(() => {
                addMessage(responseText, "system");
                enableInputs(); renderActionContent(); 
            }, 500);
        } else if (option.action === "keep_music") {
             if (musicSwitchCount === 1) { scores["白雪"] += 1; scores["鋼琴家"] += 1; scores["愛麗絲"] += 1; scores["航海家"] += 1; } 
             else if (musicSwitchCount === 2) { scores["鋼琴家"] += 1; scores["愛麗絲"] += 1; } 
             else if (musicSwitchCount > 2 && musicSwitchCount <= 5) { scores["鋼琴家"] += 1; scores["愛麗絲"] += 1; scores["傑克"] += 1; scores["壁畫"] += 1; } 
             else if (musicSwitchCount > 5) { scores["鋼琴家"] += 2; scores["愛麗絲"] += 1; scores["傑克"] += 1; scores["壁畫"] += 1; }
            triggerNextQuestion(); 
        } else {
            triggerNextQuestion();
        }
    }

    function handleStickerAnswer(src) {
        disableInputs(); addMessage(src, "user", true);
        
        if (currentQuestionIndex === 2) { flag_TutorialStickerUsed = true; }

        if (!stickerScoreMap[currentQuestionIndex]) { triggerNextQuestion(); return; }
        const filename = src.split('/').pop(); 
        let stickerType = 3; 
        if (filename === '1.png') stickerType = 1;
        else if (filename === '2.png') stickerType = 2;
        const currentScoreLogic = stickerScoreMap[currentQuestionIndex][stickerType];
        
        if (currentScoreLogic.optIndex !== null) {
            const baseAdd = questionsData[currentQuestionIndex].options[currentScoreLogic.optIndex].add;
            for (let character in baseAdd) { scores[character] += baseAdd[character]; }
        }
        if (currentScoreLogic.bonus) {
            for (let character in currentScoreLogic.bonus) { scores[character] += currentScoreLogic.bonus[character]; }
        }
        
        if (currentQuestionIndex === 2) {
            setTimeout(() => {
                addMessage("嗯~真有眼光! 這張確實把我拍得很可愛......哎呀好啦，回歸正題", "system");

            }, 500);

        }
    }

        btnYes.onclick = () => { disableInputs(); addMessage("是", "user"); setTimeout(() => { drawNextCard(); }, 500); };
        const btnNo = document.createElement("button");
        btnNo.className = "option-btn"; btnNo.innerText = "否";
        btnNo.onclick = () => { disableInputs(); addMessage("否", "user"); setTimeout(() => { finishCardEvent(false); }, 500); };
        actionArea.appendChild(btnYes); actionArea.appendChild(btnNo);
        scrollToBottom(); enableInputs();
    }

    function showSpecialInterruptButtons() {
        clearActions();
        const btnForceDraw = document.createElement("button");
        btnForceDraw.className = "option-btn"; btnForceDraw.innerText = "不，我想看你有幾張牌";
        btnForceDraw.onclick = () => { disableInputs(); addMessage("不，我想看你有幾張牌", "user"); setTimeout(() => { drawFinalCardAndFinish(); }, 500); };
        const btnStop = document.createElement("button");
        btnStop.className = "option-btn"; btnStop.innerText = "好吧，繼續";
        btnStop.onclick = () => { disableInputs(); addMessage("好吧，繼續", "user"); setTimeout(() => { addMessage("那我們繼續吧!", "system"); setTimeout(() => { finishCardEvent('stop_at_3'); }, 800); }, 600); };
        actionArea.appendChild(btnForceDraw); actionArea.appendChild(btnStop);
        scrollToBottom(); enableInputs();
    }

    function drawFinalCardAndFinish() {
        flag_CardMaxDrawn = true;
        clearActions(); drawCount++; 
        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper msg-system`; 
        const imgBubble = document.createElement("div");
        imgBubble.className = "msg-bubble-img";
        const img = document.createElement("img");
        img.src = './pics/cq1.png'; img.id = "current-card-img";
        imgBubble.appendChild(img); wrapper.appendChild(imgBubble);
        chatContainer.appendChild(wrapper); scrollToBottom();
        setTimeout(() => {
            const targetImg = document.getElementById("current-card-img");
            if (targetImg) { targetImg.src = cardPool.pop(); targetImg.removeAttribute('id'); }
            setTimeout(() => {
                addMessage("已經是最後一張囉。打破砂鍋問到底，你是很有探究精神的人呢~?", "system");
                setTimeout(() => { addMessage("那我們繼續吧!", "system"); setTimeout(() => { finishCardEvent('force_4'); }, 800); }, 1000);
            }, 800);
        }, 1000);
    }

    function finishCardEvent(state) {
        if (state === 'force_4') { scores["科學家"] += 4; } 
        else if (state === 'stop_at_3') { scores["科學家"] += 1; } 
        else if (drawCount === 1 && state === true) { scores["白雪"] += 2; scores["問號頭人"] += 2; } 
        else if (drawCount === 1 && state === false) { scores["航海家"] += 3; } 
        else if ((drawCount === 2 || drawCount === 3) && (state === true || state === false)) {
            scores["傑克"] += 1; scores["愛麗絲"] += 1; scores["鋼琴家"] += 1; scores["壁畫"] += 1;
        }
        setTimeout(() => { renderQuestion(); }, 500);
    }

    function showResult() {
        clearActions(); 
        toolbar.style.display = "none"; 
        disableInputs();
        
        setTimeout(() => { addMessage("恭喜測驗結束! 辛苦你了", "system"); }, 500);
        setTimeout(() => { addMessage("問號主持人馬上就給你解答!", "system"); }, 1500);
        setTimeout(() => { 
            addMessage("在收到你專屬的身分解答之前，我想先問問……對於我給予的答案，你有幾分的信任? ^^", "system"); 
            showTrustOptions();
        }, 3000);
    }

    function showTrustOptions() {
        const options =[
            { text: "10分滿分! 我相信問號主持人!", add: { "問號頭人": 2, "白雪": 1 } },
            { text: "7分吧...?", add: { "白雪": 2 } },
            { text: "5分?半信半疑的", add: { "愛麗絲": 1, "鋼琴家": 1 } },
            { text: "3分，我好歹回答得挺認真?", add: { "科學家": 1, "壁畫": 1, "鋼琴家": 1 } },
            { text: "0分啦，做好玩的誰會相信測驗?", add: { "航海家": 1, "傑克": 1, "科學家": 1 } },
            { text: "不告訴你!", add: {  } }
        ];

        options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt.text;
            btn.onclick = () => handleTrustAnswer(opt);
            actionArea.appendChild(btn);
        });
        
        enableInputs();
        scrollToBottom();
    }

    function handleTrustAnswer(option) {
        disableInputs();
        addMessage(option.text, "user");
        
        for (let char in option.add) { 
            scores[char] += option.add[char]; 
        }
        
        setTimeout(() => { finalCalculation(); }, 1000);
    }

    function finalCalculation() {
        let highestScore = -1; 
        let resultCharacter = "";

        for (let character in scores) {
            if (scores[character] > highestScore) { 
                highestScore = scores[character]; 
                resultCharacter = character; 
            }
        }

        let condition7 = (scores["問號頭人"] <= 2) && (scores["白雪"] <= 4);

        if (flag_IntroLateHangup && 
            flag_MusicCycled && 
            flag_CardMaxDrawn && 
            flag_Q15Reported && 
            flag_GlitchSolved && 
            flag_TutorialStickerUsed && 
            condition7) {
            
            resultCharacter = "小問號";
        }

        const charMap = {
            "白雪": "a1.png", 
            "傑克": "a2.png", 
            "愛麗絲": "a3.png", 
            "航海家": "a4.png", 
            "鋼琴家": "a5.png", 
            "壁畫": "a6.png", 
            "科學家": "a7.png", 
            "問號頭人": "a8.png", 
            "小問號": "a9.png"
        };
        const imgSrc = `./pics/${charMap[resultCharacter]}`;

        setTimeout(() => {
            addMessage("解答已經準備好了，請點擊下方文件查看：", "system");
            setTimeout(() => {
                sendDocumentAttachment(imgSrc);
            }, 800);
        }, 800);
    }

    function sendDocumentAttachment(imgSrc) {
        const wrapper = document.createElement("div");
        wrapper.className = `msg-wrapper msg-system`; 
        
        const docBubble = document.createElement("div");
        docBubble.className = "msg-bubble-doc";
        docBubble.onclick = () => showResultPage(imgSrc);
        
        docBubble.innerHTML = `
            <div class="doc-icon">📄</div>
            <div class="doc-info">
                <div class="doc-title">個人標籤報告.pdf</div>
                <div class="doc-size">點擊開啟</div>
            </div>
        `;
        
        wrapper.appendChild(docBubble);
        chatContainer.appendChild(wrapper);
        scrollToBottom();
    }

    function showResultPage(imgSrc) {
        document.getElementById('chat-container').style.display = 'none';
        document.getElementById('bottom-area').style.display = 'none';
        document.querySelector('header').style.display = 'none';
        
        const resultPage = document.getElementById('result-page');
        document.getElementById('result-image').src = imgSrc;
        resultPage.style.display = 'flex';
    }
</script>
</body>
</html>
